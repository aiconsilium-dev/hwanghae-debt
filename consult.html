<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 상담 접수 | THE H 채권회수센터</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0a0a0a; --surface: #171717; --border: #262626;
  --text: #fafafa; --text-muted: #a3a3a3; --text-dim: #737373;
  --accent: #DC2626; --accent-hover: #B91C1C; --accent-light: rgba(220,38,38,0.1);
}
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--text);
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  line-height: 1.6; -webkit-font-smoothing: antialiased; overflow-x: hidden;
  min-height: 100vh;
}
a { color: inherit; text-decoration: none; }

/* Nav */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
  padding: 20px 48px; display: flex; align-items: center; justify-content: space-between;
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  background: rgba(10,10,10,0.85); border-bottom: 1px solid var(--border);
}
.nav-logo { font-size: 20px; font-weight: 800; color: var(--accent); letter-spacing: 2px; }
.nav-links { display: flex; align-items: center; gap: 36px; }
.nav-links a { font-size: 14px; color: var(--text-muted); transition: color 0.3s; letter-spacing: 0.5px; }
.nav-links a:hover { color: var(--text); }
.nav-cta {
  background: var(--accent) !important; color: var(--text) !important;
  padding: 10px 24px !important; border-radius: 6px; font-weight: 600 !important;
}

/* Chat Container */
.consult-wrapper {
  max-width: 680px; margin: 0 auto;
  padding: 120px 24px 60px;
  min-height: 100vh;
}

.consult-header {
  text-align: center; margin-bottom: 48px;
}

.consult-header h1 {
  font-size: clamp(32px, 5vw, 48px);
  font-weight: 800; letter-spacing: -2px;
  margin-bottom: 12px;
}

.consult-header p { color: var(--text-muted); font-size: 16px; }

/* Chat */
.chat-container {
  display: flex; flex-direction: column; gap: 16px;
}

.chat-bubble {
  max-width: 80%;
  padding: 16px 20px;
  border-radius: 16px;
  font-size: 15px;
  line-height: 1.6;
  animation: bubbleIn 0.4s ease;
}

@keyframes bubbleIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

.chat-ai {
  align-self: flex-start;
  background: var(--surface);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}

.chat-ai-label {
  font-size: 12px; color: var(--accent); font-weight: 600;
  margin-bottom: 6px; letter-spacing: 1px;
}

.chat-user {
  align-self: flex-end;
  background: var(--accent);
  color: var(--text);
  border-bottom-right-radius: 4px;
}

/* Option Buttons */
.chat-options {
  display: flex; flex-wrap: wrap; gap: 10px;
  animation: bubbleIn 0.4s ease;
}

.chat-option-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 12px 24px;
  border-radius: 10px;
  font-size: 15px;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.3s;
}

.chat-option-btn:hover {
  border-color: var(--accent);
  background: var(--accent-light);
}

/* Input Area */
.chat-input-area {
  display: flex; gap: 10px; animation: bubbleIn 0.4s ease;
}

.chat-input {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 14px 20px;
  border-radius: 10px;
  font-size: 15px;
  font-family: inherit;
  outline: none;
  transition: border-color 0.3s;
}

.chat-input:focus { border-color: var(--accent); }

.chat-send-btn {
  background: var(--accent);
  border: none;
  color: var(--text);
  padding: 14px 24px;
  border-radius: 10px;
  font-size: 15px;
  font-family: inherit;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.3s;
  white-space: nowrap;
}

.chat-send-btn:hover { background: var(--accent-hover); }

/* Upload Area */
.upload-area {
  border: 2px dashed var(--border);
  background: var(--surface);
  border-radius: 12px;
  padding: 48px 24px;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s;
  animation: bubbleIn 0.4s ease;
}

.upload-area:hover { border-color: var(--accent); background: var(--accent-light); }

.upload-area p { color: var(--text-muted); font-size: 14px; margin-top: 8px; }

.upload-title { font-size: 16px; color: var(--text); font-weight: 600; }

.file-list { margin-top: 12px; }

.file-item {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--bg); padding: 8px 14px; border-radius: 6px;
  font-size: 13px; color: var(--text-muted); margin: 4px;
}

.file-remove {
  background: none; border: none; color: var(--accent);
  cursor: pointer; font-size: 16px; padding: 0 4px;
}

/* Contact Form */
.contact-inputs {
  display: flex; flex-direction: column; gap: 12px;
  animation: bubbleIn 0.4s ease;
}

/* Complete */
.complete-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 48px 32px;
  text-align: center;
  animation: bubbleIn 0.5s ease;
}

.complete-card h2 {
  font-size: 28px; font-weight: 800;
  letter-spacing: -1px; margin-bottom: 16px;
}

.complete-number {
  font-size: 14px; color: var(--accent);
  font-weight: 600; letter-spacing: 2px; margin-bottom: 24px;
}

.complete-card p { color: var(--text-muted); font-size: 15px; }

.skip-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-muted);
  padding: 10px 20px;
  border-radius: 8px;
  font-size: 14px;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.3s;
  margin-top: 8px;
}

.skip-btn:hover {
  border-color: var(--text-dim);
  color: var(--text);
}

.mobile-toggle { display: none; background: none; border: none; cursor: pointer; padding: 8px; }
.mobile-toggle span { display: block; width: 24px; height: 2px; background: var(--text); margin: 5px 0; }
@media (max-width: 768px) {
  nav { padding: 16px 24px; }
  .mobile-toggle { display: block; }
  .nav-links {
    position: fixed; top: 0; right: -100%; width: 280px; height: 100vh;
    background: var(--surface); flex-direction: column; padding: 80px 32px;
    gap: 24px; transition: right 0.3s; border-left: 1px solid var(--border);
  }
  .nav-links.open { right: 0; }
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">THE H</a>
  <div class="nav-links" id="navLinks">
    <a href="service.html">서비스</a>
    <a href="cost.html">비용</a>
    <a href="cases.html">사례</a>
    <a href="consult.html" class="nav-cta">상담 접수</a>
  </div>
  <button class="mobile-toggle" id="mobileToggle" aria-label="메뉴">
    <span></span><span></span><span></span>
  </button>
</nav>

<div class="consult-wrapper">
  <div class="consult-header">
    <h1>AI 상담 접수</h1>
    <p>몇 가지 질문에 답하시면, 담당 변호사가 맞춤 상담을 드립니다.</p>
  </div>

  <div class="chat-container" id="chat"></div>
</div>

<script>
const chat = document.getElementById('chat');
let currentStep = 0;
let formData = { type: '', target: '', amount: '', date: '', evidence: [], hasNotice: '', files: [], name: '', phone: '' };

const flows = {
  loan: [
    { q: '상대방은 누구인가요?', options: ['개인', '법인'], key: 'target' },
    { q: '얼마를 빌려주셨나요?', input: true, placeholder: '예: 500만원', key: 'amount' },
    { q: '언제 빌려주셨나요?', input: true, placeholder: '예: 2024년 3월', key: 'date', skip: '정확히 모름' },
    { q: '차용증이나 이체 내역이 있나요?', options: ['차용증', '이체내역', '카톡 대화', '없음'], key: 'evidence', multi: true },
    { q: '내용증명을 보낸 적 있나요?', options: ['보냈음', '안 보냈음'], key: 'hasNotice' }
  ],
  wage: [
    { q: '근무 형태는 어떻게 되나요?', options: ['정규직', '계약직', '일용직', '프리랜서'], key: 'target' },
    { q: '체불된 금액은 대략 얼마인가요?', input: true, placeholder: '예: 300만원', key: 'amount' },
    { q: '마지막 근무일은 언제인가요?', input: true, placeholder: '예: 2025년 12월', key: 'date', skip: '정확히 모름' },
    { q: '근로계약서나 급여명세서가 있나요?', options: ['근로계약서', '급여명세서', '출퇴근 기록', '없음'], key: 'evidence', multi: true },
    { q: '노동청에 진정을 넣은 적 있나요?', options: ['있음', '없음'], key: 'hasNotice' }
  ],
  invest: [
    { q: '어떤 유형의 투자였나요?', options: ['주식/코인', '부동산', '사업 투자', '기타'], key: 'target' },
    { q: '투자 금액은 얼마인가요?', input: true, placeholder: '예: 2,000만원', key: 'amount' },
    { q: '언제 투자하셨나요?', input: true, placeholder: '예: 2024년 6월', key: 'date', skip: '정확히 모름' },
    { q: '투자 관련 증거가 있나요?', options: ['계약서', '이체내역', '대화 기록', '없음'], key: 'evidence', multi: true },
    { q: '경찰 신고를 하셨나요?', options: ['했음', '안 했음'], key: 'hasNotice' }
  ],
  etc: [
    { q: '어떤 상황인지 간단히 알려주세요.', input: true, placeholder: '상황을 입력해주세요', key: 'target' },
    { q: '관련 금액은 얼마인가요?', input: true, placeholder: '예: 1,000만원', key: 'amount' },
    { q: '증거 자료가 있나요?', options: ['계약서', '이체내역', '메시지 기록', '없음'], key: 'evidence', multi: true }
  ]
};

const typeMap = { '빌려준 돈': 'loan', '못 받은 급여': 'wage', '투자금/사기': 'invest', '기타': 'etc' };

function addAI(text) {
  const div = document.createElement('div');
  div.className = 'chat-bubble chat-ai';
  div.innerHTML = '<div class="chat-ai-label">THE H</div>' + text;
  chat.appendChild(div);
  scrollBottom();
}

function addUser(text) {
  const div = document.createElement('div');
  div.className = 'chat-bubble chat-user';
  div.textContent = text;
  chat.appendChild(div);
  scrollBottom();
}

function addOptions(options, callback) {
  const div = document.createElement('div');
  div.className = 'chat-options';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'chat-option-btn';
    btn.textContent = opt;
    btn.onclick = () => {
      div.remove();
      callback(opt);
    };
    div.appendChild(btn);
  });
  chat.appendChild(div);
  scrollBottom();
}

function addInput(placeholder, callback, skipText) {
  const div = document.createElement('div');
  div.className = 'chat-input-area';
  const input = document.createElement('input');
  input.className = 'chat-input';
  input.placeholder = placeholder;
  input.type = 'text';
  const btn = document.createElement('button');
  btn.className = 'chat-send-btn';
  btn.textContent = '전송';
  const submit = () => {
    if (!input.value.trim()) return;
    const val = input.value.trim();
    div.remove();
    if (skipDiv) skipDiv.remove();
    callback(val);
  };
  btn.onclick = submit;
  input.onkeydown = (e) => { if (e.key === 'Enter') submit(); };
  div.appendChild(input);
  div.appendChild(btn);
  chat.appendChild(div);

  let skipDiv = null;
  if (skipText) {
    skipDiv = document.createElement('div');
    skipDiv.style.cssText = 'animation: bubbleIn 0.4s ease;';
    const skipBtn = document.createElement('button');
    skipBtn.className = 'skip-btn';
    skipBtn.textContent = skipText;
    skipBtn.onclick = () => {
      div.remove();
      skipDiv.remove();
      callback(skipText);
    };
    skipDiv.appendChild(skipBtn);
    chat.appendChild(skipDiv);
  }

  input.focus();
  scrollBottom();
}

function addUpload(callback) {
  const div = document.createElement('div');
  div.className = 'upload-area';
  div.innerHTML = '<div class="upload-title">파일을 드래그하거나 클릭하여 업로드</div><p>이미지, PDF, 문서 파일 지원</p><div class="file-list" id="fileList"></div>';
  const fileInput = document.createElement('input');
  fileInput.type = 'file';
  fileInput.multiple = true;
  fileInput.style.display = 'none';
  div.appendChild(fileInput);
  div.onclick = (e) => { if (e.target.closest('.file-remove')) return; fileInput.click(); };

  const files = [];
  fileInput.onchange = () => {
    Array.from(fileInput.files).forEach(f => files.push(f));
    renderFiles();
  };

  function renderFiles() {
    const list = div.querySelector('#fileList');
    list.innerHTML = files.map((f, i) =>
      `<span class="file-item">${f.name} <button class="file-remove" data-i="${i}">x</button></span>`
    ).join('');
    list.querySelectorAll('.file-remove').forEach(btn => {
      btn.onclick = (e) => { e.stopPropagation(); files.splice(btn.dataset.i, 1); renderFiles(); };
    });
  }

  chat.appendChild(div);

  const btns = document.createElement('div');
  btns.className = 'chat-options';
  btns.style.marginTop = '8px';

  const skipBtn = document.createElement('button');
  skipBtn.className = 'skip-btn';
  skipBtn.textContent = '건너뛰기';
  skipBtn.onclick = () => { div.remove(); btns.remove(); callback([]); };

  const nextBtn = document.createElement('button');
  nextBtn.className = 'chat-send-btn';
  nextBtn.textContent = '다음';
  nextBtn.onclick = () => { div.remove(); btns.remove(); callback(files); };

  btns.appendChild(skipBtn);
  btns.appendChild(nextBtn);
  chat.appendChild(btns);
  scrollBottom();
}

function addContactForm(callback) {
  const div = document.createElement('div');
  div.className = 'contact-inputs';
  div.innerHTML = `
    <input class="chat-input" id="cName" placeholder="이름" type="text">
    <input class="chat-input" id="cPhone" placeholder="전화번호" type="tel">
    <button class="chat-send-btn" id="cSubmit" style="align-self:flex-end">접수하기</button>
  `;
  chat.appendChild(div);
  div.querySelector('#cSubmit').onclick = () => {
    const name = div.querySelector('#cName').value.trim();
    const phone = div.querySelector('#cPhone').value.trim();
    if (!name || !phone) return;
    div.remove();
    callback(name, phone);
  };
  div.querySelector('#cName').focus();
  scrollBottom();
}

function showComplete() {
  const num = 'H-' + Date.now().toString().slice(-8);
  const div = document.createElement('div');
  div.className = 'complete-card';
  div.innerHTML = `
    <h2>접수가 완료되었습니다</h2>
    <div class="complete-number">접수번호 ${num}</div>
    <p>담당 변호사가 1영업일 내 연락드리겠습니다.</p>
  `;
  chat.appendChild(div);
  scrollBottom();
}

function scrollBottom() {
  setTimeout(() => window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }), 100);
}

function runFlow() {
  const flow = flows[formData.type];
  if (!flow || currentStep >= flow.length) {
    // Upload step
    setTimeout(() => {
      addAI('증거가 될 자료가 있으면 올려주세요.');
      addUpload((files) => {
        formData.files = files;
        if (files.length) addUser(files.length + '개 파일 첨부');
        else addUser('건너뛰기');
        setTimeout(() => {
          addAI('마지막으로 연락처를 남겨주세요.');
          addContactForm((name, phone) => {
            formData.name = name;
            formData.phone = phone;
            addUser(name + ' / ' + phone);
            setTimeout(() => showComplete(), 500);
          });
        }, 500);
      });
    }, 500);
    return;
  }

  const step = flow[currentStep];
  setTimeout(() => {
    addAI(step.q);
    if (step.options) {
      addOptions(step.options, (val) => {
        formData[step.key] = val;
        addUser(val);
        currentStep++;
        runFlow();
      });
    } else if (step.input) {
      addInput(step.placeholder, (val) => {
        formData[step.key] = val;
        addUser(val);
        currentStep++;
        runFlow();
      }, step.skip);
    }
  }, 500);
}

// Start
setTimeout(() => {
  addAI('어떤 돈을 못 받으셨나요?');
  addOptions(['빌려준 돈', '못 받은 급여', '투자금/사기', '기타'], (val) => {
    addUser(val);
    formData.type = typeMap[val];
    currentStep = 0;
    runFlow();
  });
}, 300);

document.getElementById('mobileToggle').addEventListener('click', () => {
  document.getElementById('navLinks').classList.toggle('open');
});
</script>
</body>
</html>
